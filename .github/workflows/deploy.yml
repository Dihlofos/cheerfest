name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run generate
        env:
          BASE_URL: /cheerfest/

      # Rewrite hardcoded absolute paths для работы из подпапки /cheerfest/
      - name: Rewrite static asset paths for GitHub Pages subpath
        run: |
          cd app/.output/public
          find . -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' \) \
            -exec sed -i 's|/images/|/cheerfest/images/|g' {} +
          find . -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' \) \
            -exec sed -i 's|/docs/|/cheerfest/docs/|g' {} +

      # .nojekyll — иначе Jekyll игнорирует _assets/
      - run: touch app/.output/public/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
